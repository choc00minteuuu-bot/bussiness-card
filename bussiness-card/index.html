<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Business Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/f77600b8df.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="header_left">
            <h1>Eunice</h1>
            <div class="bio">
                <p> A student passionate about programming and creative web design.
        Currently learning at Algorithmics.</p>
            </div>
        </div>
        <div class="header_right">
            <div class="header_btn">
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>
    </header>
    <main>
        <section class="skills">
            <h1>Skills</h1>
            <div class="section_row">
                <div class="section_item">
                    <img src="html_logo.png" alt="">
                </div>
                <div class="section_item">
                    <img src="css_logo.png" alt="">
                </div>
                <div class="section_item">
                    <img src="js_logo.png" alt="">
                </div>
            </div>
        </section>
        <section class="projects">
            <h1>Projects</h1>
            <div class="section_row">
                <div class="section_item github">
                    <img src="github_logo.png" alt="">
                    <a href="https://github.com/eunice" target="_blank">
  <img src="github.png" alt="GitHub">
</a>
                </div>
            </div>
        </section>
        <section class="contacts">
            <h1>Contacts</h1>
            <div class="section_row">
                <div class="section_item">
                    <img src="tg_logo.svg" alt="">
                    <a href="https://t.me/dimpledapples" target="_blank">
  <img src="telegram.png" alt="Telegram">
</a>
                </div>
                <div class="section_item">
                    <img src="email_logo.png" alt="">
                    <a href="mailto:choc00minteuuu@gmail.com">
  <img src="email.png" alt="Email">
</a>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer_content">
            Created by Eunice in 2026 | Algorithmics
        </div>
    </footer>
</body>
</html>
